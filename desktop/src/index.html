<!DOCTYPE html>
<html lang="en" data-theme="dark" class="sk-loading">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Content Security Policy to allow external fonts and scripts safely -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com;     img-src 'self' data: blob: orbit-db: orbit-file: orbit-avatar: https://media.giphy.com https://opengraph.githubassets.com https://i.ytimg.com; media-src 'self' data: blob: orbit-db: orbit-file: orbit-avatar:; connect-src 'self' orbit-avatar: https://cdn.jsdelivr.net https://api.mymemory.translated.net;">
  
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <title>Orbit</title>
  
  <!-- Google Fonts CDN as fallback/default -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- CSS Architecture -->
  <link rel="stylesheet" href="styles/variables.css">
  <link rel="stylesheet" href="styles/themes/light.css">
  <link rel="stylesheet" href="styles/themes/dark.css">
  <link rel="stylesheet" href="styles/themes/dark-purple.css">
  <link rel="stylesheet" href="styles/themes/midnight.css">
  <link rel="stylesheet" href="styles/themes/sunset.css">
  <link rel="stylesheet" href="styles/themes/nord.css">
  <link rel="stylesheet" href="styles/themes/seasonal-spring.css">
  <link rel="stylesheet" href="styles/themes/seasonal-summer.css">
  <link rel="stylesheet" href="styles/themes/seasonal-fall.css">
  <link rel="stylesheet" href="styles/themes/seasonal-winter.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/animations.css">

  <!-- Syntax Highlighting (Prism) -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="../node_modules/lucide/dist/umd/lucide.min.js"></script>

  <!-- QR Code Generator -->
  <script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode.js"></script>
  <script>window.QRCode = qrcode;</script>

  <!-- Emoji Picker Element -->
  <script type="module" src="../node_modules/emoji-picker-element/index.js"></script>
</head>
<body>
  <!-- Custom Titlebar -->
  <div id="titlebar">
    <div id="titlebar-nav" style="display: flex; align-items: center; padding-left: 6px; gap: 4px; z-index: 1000; -webkit-app-region: no-drag;">
      <button class="titlebar-nav-btn" id="btn-nav-back" title="No actions to undo" style="width: 24px; height: 24px; border-radius: 4px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; opacity:0.2;">
        <i data-lucide="undo-2" style="width:12px;height:12px;"></i>
      </button>
      <button class="titlebar-nav-btn" id="btn-nav-forward" title="No actions to redo" style="width: 24px; height: 24px; border-radius: 4px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; opacity:0.2;">
        <i data-lucide="redo-2" style="width:12px;height:12px;"></i>
      </button>
    </div>
    <div class="titlebar-drag-area"></div>
    <div class="controls">
      <button id="btn-minimize" class="control-btn" title="Minimize">
        <i data-lucide="minus"></i>
      </button>
      <button id="btn-maximize" class="control-btn" title="Maximize">
        <i data-lucide="square"></i>
      </button>
      <button id="btn-close" class="control-btn control-btn-close" title="Close">
        <i data-lucide="x"></i>
      </button>
    </div>
  </div>

  <!-- App Layout Grid -->
  <div id="app-layout">
    
    <!-- Panel 1: Main Sidebar (Icon Rail) -->
    <aside id="panel-left">
      <div id="left-sidebar-container"></div>
    </aside>

    <!-- Panel 2: Middle Sidebar (Friends / Groups) -->
    <aside id="panel-middle" style="position:relative;">
      <div id="middle-sidebar-container"></div>
      <div id="sidebar-resizer" style="position:absolute; top:0; right:-3px; width:6px; height:100%; cursor:col-resize; z-index:10;"></div>
    </aside>

    <!-- Panel 3: Chat Window & Global Gallery -->
    <main id="panel-right">
      <div id="chat-container"></div>
      <div id="global-gallery-container" style="display:none; height:100%; width:100%; flex-direction:column; background:var(--bg-base);"></div>
      
      <!-- Panel 4: Shared Media Sidebar (Overlay) -->
      <aside id="panel-gallery" style="display:none; position:absolute; top:0; right:0; bottom:0; width:340px; background:var(--bg-surface); border-left:1px solid var(--border-subtle); box-shadow:var(--shadow-xl); z-index:100; flex-direction:column;">
        <div style="height:64px; border-bottom:1px solid var(--border-subtle); display:flex; justify-content:space-between; align-items:center; padding:0 var(--spacing-lg); flex-shrink:0;">
          <span style="font-weight:600; font-family:var(--font-display);">Shared Media</span>
          <button id="btn-close-gallery" style="background:transparent; border:none; cursor:pointer; color:var(--text-secondary);"><i data-lucide="x"></i></button>
        </div>
        <div style="display:flex; border-bottom:1px solid var(--border-subtle); padding:0 16px; gap:16px; flex-shrink:0;">
          <div class="gallery-tab active" data-tab="images" style="padding:12px 0; cursor:pointer; font-size:13px; font-weight:600; color:var(--text-primary); border-bottom:2px solid var(--accent-primary);">Images</div>
          <div class="gallery-tab" data-tab="files" style="padding:12px 0; cursor:pointer; font-size:13px; font-weight:500; color:var(--text-secondary); border-bottom:2px solid transparent;">Files</div>
          <div class="gallery-tab" data-tab="links" style="padding:12px 0; cursor:pointer; font-size:13px; font-weight:500; color:var(--text-secondary); border-bottom:2px solid transparent;">Links</div>
        </div>
        <div id="gallery-content" style="flex:1; overflow-y:auto; padding:var(--spacing-md); display:flex; flex-direction:column; gap:16px;"></div>
      </aside>

      <!-- Panel 5: Profile Sidebar (Overlay) -->
      <aside id="panel-profile" style="display:none; position:absolute; top:0; right:0; bottom:0; width:320px; background:var(--bg-surface); border-left:1px solid var(--border-subtle); box-shadow:var(--shadow-xl); z-index:100; flex-direction:column;">
        <div id="profile-sidebar-content" style="flex:1; overflow-y:auto;"></div>
      </aside>
    </main>

    <!-- App Skeleton (shown during boot, removed after UI initializes) -->
    <div id="app-skeleton">
      <div class="sk-titlebar">
        <div class="sk-filler"></div>
        <div class="sk-box sk-win-btn"></div>
        <div class="sk-box sk-win-btn"></div>
        <div class="sk-box sk-win-btn"></div>
      </div>
      <div class="sk-section sk-left">
        <div class="sk-box sk-icon"></div>
        <div class="sk-box sk-icon"></div>
        <div class="sk-box sk-icon"></div>
        <div class="sk-box sk-icon"></div>
        <div class="sk-spacer"></div>
        <div class="sk-box sk-icon"></div>
      </div>
      <div class="sk-section sk-mid">
        <div class="sk-box sk-search"></div>
        <div class="sk-tabs">
          <div class="sk-box sk-tab"></div>
          <div class="sk-box sk-tab"></div>
        </div>
        <div class="sk-list">
          <div class="sk-row"><div class="sk-box sk-avatar"></div><div class="sk-lines"><div class="sk-box sk-line w-70"></div><div class="sk-box sk-line w-40"></div></div></div>
          <div class="sk-row"><div class="sk-box sk-avatar"></div><div class="sk-lines"><div class="sk-box sk-line w-55"></div><div class="sk-box sk-line w-35"></div></div></div>
          <div class="sk-row"><div class="sk-box sk-avatar"></div><div class="sk-lines"><div class="sk-box sk-line w-65"></div><div class="sk-box sk-line w-45"></div></div></div>
          <div class="sk-row"><div class="sk-box sk-avatar"></div><div class="sk-lines"><div class="sk-box sk-line w-50"></div><div class="sk-box sk-line w-30"></div></div></div>
          <div class="sk-row"><div class="sk-box sk-avatar"></div><div class="sk-lines"><div class="sk-box sk-line w-60"></div><div class="sk-box sk-line w-40"></div></div></div>
          <div class="sk-row"><div class="sk-box sk-avatar"></div><div class="sk-lines"><div class="sk-box sk-line w-45"></div><div class="sk-box sk-line w-35"></div></div></div>
        </div>
      </div>
      <div class="sk-section sk-main">
        <div class="sk-header">
          <div class="sk-box sk-avatar lg"></div>
          <div class="sk-lines"><div class="sk-box sk-line w-30"></div><div class="sk-box sk-line w-15"></div></div>
        </div>
        <div class="sk-chat">
          <div class="sk-msg rc"><div class="sk-box sk-bubble w-55"></div></div>
          <div class="sk-msg sn"><div class="sk-box sk-bubble w-40"></div></div>
          <div class="sk-msg rc"><div class="sk-box sk-bubble w-60"></div></div>
          <div class="sk-msg sn"><div class="sk-box sk-bubble w-35"></div></div>
          <div class="sk-msg rc"><div class="sk-box sk-bubble w-45"></div></div>
        </div>
        <div class="sk-box sk-input"></div>
      </div>
    </div>

  </div>

  <!-- Modals & Overlays -->
  <div id="modal-container"></div>
  <div id="image-viewer-modal"></div>
  <div id="toast-container"></div>

  <!-- App Scripts -->
  <script src="js/utils/storage.js"></script>
  <script src="js/utils/format.js"></script>
  <script src="js/utils/sanitize.js"></script>
  <script src="js/utils/profanity.js"></script>
  <script src="js/network/protocol.js"></script>
  <script src="js/store.js"></script>
  <script src="js/identity.js"></script>
  <script src="js/components/emoji-picker.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/undo-manager.js"></script>
  <script src="js/components/confirm-modal.js"></script>
  <script src="js/components/context-menu.js"></script>
  <script src="js/components/image-viewer.js"></script>
  <script src="js/views/sidebar-left.js"></script>
  <script src="js/views/sidebar-middle.js"></script>
  <script src="js/views/chat-panel.js"></script>
  <script src="js/views/gallery-sidebar.js"></script>
  <script src="js/views/profile-sidebar.js"></script>
  <script src="js/views/global-gallery.js"></script>
  <script src="js/components/profile-card.js"></script>
  <script src="js/views/settings-modal.js"></script>
  <script src="js/views/tutorial-modal.js"></script>
  <script src="js/components/changelog.js"></script>
  <script src="js/components/activity-center.js"></script>
  <script src="js/components/custom-theme-modal.js"></script>
  <script src="js/components/webrtc-call.js"></script>
  <script src="js/components/pin-lock-screen.js"></script>
  <script src="js/components/account-switcher.js"></script>
  <script src="../../shared/ui/audio-player.js"></script>
  <script src="../../shared/ui/video-player.js"></script>

  <!-- Syntax Highlighting (Prism) — loads before app.js so available on first render -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

  <script src="js/app.js"></script>
</body>
</html>
